AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Voice memo upload service. Issues presigned S3 PUT URLs for audio files
  via an API-key-protected HTTP API endpoint.

Parameters:
  ApiKey:
    Type: String
    NoEcho: true
    Description: Shared secret expected in the x-api-key header.
  BucketName:
    Type: String
    Default: aws-voice-memo
    Description: Name of the S3 bucket that stores voice memos.
  TranscribeLanguageCode:
    Type: String
    Default: en-US
    Description: Language code to use for AWS Transcribe jobs.
  MaxSpeakerLabels:
    Type: Number
    Default: 4
    MinValue: 2
    MaxValue: 10
    Description: Maximum number of speakers for Transcribe diarization.
  TranscriptionBackend:
    Type: String
    Default: aws-transcribe
    AllowedValues:
      - aws-transcribe
      - deepgram
    Description: Transcription backend to use for uploaded voice memos.
  DeepgramApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Deepgram API key. Required only when TranscriptionBackend is deepgram.
  AnthropicApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Anthropic API key for transcript summaries and Discord notifications.
  AnthropicModel:
    Type: String
    Default: claude-sonnet-4-20250514
    Description: Anthropic model used to summarize transcripts.
  DiscordWebhookUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: Discord webhook URL for transcript summary notifications.

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64

Conditions:
  UseDeepgramBackend: !Equals [!Ref TranscriptionBackend, deepgram]
  EnableDiscordNotifications: !And
    - !Not [!Equals [!Ref AnthropicApiKey, ""]]
    - !Not [!Equals [!Ref DiscordWebhookUrl, ""]]

Resources:
  VoiceMemoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            MaxAge: 300

  UploadUrlApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  UploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: src/
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowMethods: [POST]
          AllowOrigins: ["*"]
          AllowHeaders: [content-type, x-api-key]
      Environment:
        Variables:
          API_KEY: !Ref ApiKey
          BUCKET_NAME: !Ref BucketName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketName}/unprocessed/*"
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref UploadUrlApi
            Path: /upload-url
            Method: POST

  TranscribeDataAccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: transcribe.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TranscribeS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketName}/unprocessed/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketName}/processed/*/transcript.json"

  StartTranscriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.startTranscriptionHandler
      CodeUri: src/
      Timeout: 300
      Environment:
        Variables:
          DEEPGRAM_API_KEY: !Ref DeepgramApiKey
          OUTPUT_PREFIX: processed
          TRANSCRIPTION_BACKEND: !Ref TranscriptionBackend
          TRANSCRIBE_DATA_ACCESS_ROLE_ARN: !GetAtt TranscribeDataAccessRole.Arn
          TRANSCRIBE_LANGUAGE_CODE: !Ref TranscribeLanguageCode
          MAX_SPEAKER_LABELS: !Ref MaxSpeakerLabels
      Policies:
        - Statement:
            - !If
              - UseDeepgramBackend
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketName}/unprocessed/*"
              - !Ref AWS::NoValue
            - !If
              - UseDeepgramBackend
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketName}/processed/*"
              - !Ref AWS::NoValue
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
              Resource: "*"
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: !GetAtt TranscribeDataAccessRole.Arn
              Condition:
                StringEquals:
                  iam:PassedToService: transcribe.amazonaws.com
      Events:
        UploadedMemo:
          Type: S3
          Properties:
            Bucket: !Ref VoiceMemoBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: unprocessed/

  DiscordNotificationTable:
    Type: AWS::DynamoDB::Table
    Condition: EnableDiscordNotifications
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transcriptKey
          AttributeType: S
      KeySchema:
        - AttributeName: transcriptKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  NotifyDiscordFunction:
    Type: AWS::Serverless::Function
    Condition: EnableDiscordNotifications
    Properties:
      Handler: index.notifyDiscordHandler
      CodeUri: src/
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          ANTHROPIC_MODEL: !Ref AnthropicModel
          DISCORD_NOTIFICATION_TABLE: !Ref DiscordNotificationTable
          DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          OUTPUT_PREFIX: processed
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketName}/processed/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
              Resource: !GetAtt DiscordNotificationTable.Arn
      Events:
        ProcessedTranscript:
          Type: S3
          Properties:
            Bucket: !Ref VoiceMemoBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: processed/
                  - Name: suffix
                    Value: transcript.json

Outputs:
  ApiEndpoint:
    Description: POST here with x-api-key header to get a presigned upload URL.
    Value: !Sub "https://${UploadUrlApi}.execute-api.${AWS::Region}.amazonaws.com/prod/upload-url"
  FunctionUrl:
    Description: Direct Lambda Function URL (auth handled in-code via x-api-key).
    Value: !GetAtt UploadUrlFunctionUrl.FunctionUrl
  BucketArn:
    Description: ARN of the voice memo bucket.
    Value: !Sub "arn:${AWS::Partition}:s3:::${BucketName}"
  TranscribeDataAccessRoleArn:
    Description: ARN of the IAM role AWS Transcribe assumes to read input and write output.
    Value: !GetAtt TranscribeDataAccessRole.Arn
  DiscordNotificationTableName:
    Condition: EnableDiscordNotifications
    Description: DynamoDB table used to dedupe Discord transcript notifications.
    Value: !Ref DiscordNotificationTable
